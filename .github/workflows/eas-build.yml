name: EAS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to use
        type: choice
        options:
          - development
          - preview
          - production
        default: preview
      platform:
        description: Platform to build for
        type: choice
        options:
          - all
          - ios
          - android
        default: all

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        run: eas build --non-interactive --profile ${{ inputs.profile || 'preview' }} --platform ${{ inputs.platform || 'all' }}
